name: conformance

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  fixtures:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python tools/generate-fixtures/verify_fixtures.py
