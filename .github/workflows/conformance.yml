name: conformance

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - master
      - dev

permissions:
  contents: read

jobs:
  fixtures:
    name: Fixture conformance
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run fixture conformance
        run: python tools/conformance/run_conformance.py

  csharp:
    name: C# conformance and tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Run no-package C# conformance runner
        run: dotnet run --project tools/conformance/csharp/PositionTape.Conformance/PositionTape.Conformance.csproj --configuration Release

      - name: Restore C# tests
        run: dotnet restore languages/csharp/tests/PositionTape.Tests/PositionTape.Tests.csproj

      - name: Run C# tests
        run: dotnet test languages/csharp/tests/PositionTape.Tests/PositionTape.Tests.csproj --configuration Release --no-restore
